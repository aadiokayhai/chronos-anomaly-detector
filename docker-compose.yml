services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    networks:
      - chronos_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    networks:
      - chronos_net
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_WS_URL=ws://backend:8000/ws/telemetry
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"

networks:
  chronos_net:
    driver: bridge
